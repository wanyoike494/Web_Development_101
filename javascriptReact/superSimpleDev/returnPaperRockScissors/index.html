<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Rock Paper Scissors</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <button onclick="
        const computerMove = pickComputerMove();

        // Compare moves and show the result
        let result = '';

        if (computerMove === 'rock') {
            result = 'Tie.';
        } else if (computerMove === 'paper') {
            result = 'You lose!';
        } else if (computerMove === 'scissors') {
            result = 'You win.';
        }

        alert(`You picked Rock. Computer picked ${computerMove}. ${result}`);">Rock</button>

    <button onclick="
        const computerMove = pickComputerMove();

        // Compare moves and show the result
        let result = '';

        if (computerMove === 'paper') {
            result = 'Tie.';
        } else if (computerMove === 'scissors') {
            result = 'You lose!';
        } else if (computerMove === 'rock') {
            result = 'You win.';
        }

        alert(`You picked Paper. Computer picked ${computerMove}. ${result}`);">Paper</button>

    <button onclick="
        const computerMove = pickComputerMove();

        // Compare moves and show the result
        let result = '';

        if (computerMove === 'scissors') {
            result = 'Tie.';
        } else if (computerMove === 'rock') {
            result = 'You lose!';
        } else if (computerMove === 'paper') {
            result = 'You win.';
        }

        alert(`You picked Scissors. Computer picked ${computerMove}. ${result}`);">Scissors</button>

    <!-- Script -->
    <!-- <script src="script.js"></script> -->
    <script>
        // let computerMove = ''
        function pickComputerMove(){
            const randomNumber = Math.random();
            

            // Determine the computer's move
            if (randomNumber >= 0 && randomNumber < 1/3) {
                computerMove = 'rock';
            } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                computerMove = 'paper';
            } else if (randomNumber >= 2/3 && randomNumber < 1) {
                computerMove = 'scissors';
            }

            return computerMove;
        }
    </script>
</body>
</html>
