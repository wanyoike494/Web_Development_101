<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <style>
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container{
            background-color: pink;
            color: green;
            width: 400px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <p  class="back"><a href="www.amazon.com">Back to Amazon</a></p><br>
        <p class="nike">Nike Black Running Shoes</p><br>
        <p class="dollar">$39 - in stock</p>
        <p class="delivery">Free Delivery Tommorow</p>

        <div class="buttons">
            <button class="cart">Add to cart</button>
            <button class="buy">Buy Now</button>
        </div>

    </div>
    
</body>
</html>
