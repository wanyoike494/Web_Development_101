<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons
    </title>
    <style>
        .sub {
            background-color: rgb(200, 0, 0);
            color: white;
            border: none;
            /* height: 36px;
            width: 105px; */
            border-radius: 12px;
            cursor: pointer;
            margin-right: 15px;
            transition: opacity 1s;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding-right: 10px;
            vertical-align: top;
        }
        .sub:hover{
            background-color: green;
            opacity: 0.4;
        }
        .sub:active{
            opacity: 0.7;
        }
        .join{
            background-color: rgb(41, 118, 211);
            /* height: 30px;
            width: 96px; */
            border-radius: 10px;
            cursor: pointer;
            border-width: 4px;
            border-style: solid;
            border-color:rgb(200, 0, 0);
            padding-left: 30px;
            padding-top: 20px;
            
        }
        .join:hover{
            background-color: rgb(200, 0, 0);
            color: rgb(41, 118, 211);
        }
        .tweet{
            background-color: indigo;
            color:brown;
            height: 42px;
            width: 102px;
            cursor: pointer;
            border-radius: 9px;
            border-width: 2px;
            border-style: solid;
            border-color: yellowgreen;
            margin-left: 9px;
            font-weight:  bold;
            font-size: 16px;
            transition: opacity 2s;
            

        }
        .tweet:hover{
            opacity: 0.7;
            box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.7);
        }
        .buttons{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>

    <div class="buttons">
        <button class="sub">Subscribe</button>
        <button class="join">Join my site and enjoy</button>
        <button class="tweet">Tweet</button>
    </div>
    
</body>
</html>
