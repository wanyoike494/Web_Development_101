<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons
    </title>
    <style>
        .sub {
            background-color: rgb(200, 0, 0);
            color: white;
            border: none;
            height: 36px;
            width: 105px;
            border-radius: 12px;
            border-width: 1px;
            cursor: pointer;
            margin-right: 8px;
            transition: background-color 0.3s ease;
        }
        .sub:hover{
            background:rgb(0, 200, 43)
        }
        .join{
            background-color: rgb(41, 118, 211);
            height: 30px;
            width: 96px;
            border-radius: 10px;
            cursor: pointer;
            border-width: 4px;
            border-style: solid;
            border-color:rgb(200, 0, 0);
            transition: background-color 0.3s ease, 
            color 0.3s ease;
            
        }
        .join:hover{
            background-color: rgb(0, 200, 43);
            color: white;
        }
        .join:active{
            opacity: 0.7
        }
        .tweet{
            background-color: indigo;
            color:brown;
            height: 42px;
            width: 102px;
            cursor: pointer;
            border-radius: 9px;
            border-width: 2px;
            border-style: solid;
            border-color: yellowgreen;
            margin-left: 9px;
            font-weight:  bold;
            font-size: 16px;

        }
        .tweet:hover{
            background-color:black;
        }
        .tweet:active{
            opacity: 0.7;
        }
        #buttons{
            display:flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

    <div id="buttons">
    <button class="sub">Subscribe</button>
    <button class="join">Join</button>
    <button class="tweet">Tweet</button>
    </div>
    
</body>
</html>
