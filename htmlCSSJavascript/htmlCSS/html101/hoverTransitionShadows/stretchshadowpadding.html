<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #stretchButton{
            background-color: green;
            color: aliceblue;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 15px;
            padding-right: 15px;
            transition: padding-top 1s,
                        padding-bottom 1s,
                        padding-left 1s,
                        padding-right 1s;
        }
         #stretchButton:hover{
            padding-top: 18px;
            padding-bottom: 18px;
            padding-left: 36px;
            padding-right: 36px;
         }


    </style>
</head>
<body>
        <div id="stretchContainer">
            <button id="stretchButton">Stretch</button>
        </div>
</body>
</html>
