<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Buttons</title>
    <style>
        #buttons{
            display: flex;
            justify-content: center;
            align-content: center;
            height: 100vh;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 800px;
        }
        #uber{
            background-color: black;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-right: 10px;
        }
        #uber:hover{
            background-color: white;
            color: black;
            border: 2px solid black;
        }
        
        
        #amazon{
            background-color: yellow;
            color: black;
            border-radius: 10px;
            height: 48px;
            width: 360px;
        }
        #github{
            background-color: green;
            color: white;
            font-weight: bold;
            height: 48px;
            width: 180px;
            border-radius: 10px;
            margin-left: 10px;
        }
        #bootstrap{
            background-color: purple;
            height:48px;
            width: 180px;
            border-radius:  10px;

        }
        #download{
            background-color: white;
            color: purple;
            font-weight: bold;
            height:48px;
            width: 90px;
            border-radius:  10px;
        }
        #linkedin{
            background-color: blue;
            color: white;
            height:48px;
            width: 180px;
            border-radius:  10px;
        }
        #save{
            background-color: white;
            color: blue;
            height:48px;
            width: 100px;
            border-radius:  10px;
        }
    </style>
</head>
<body>
    <div id="buttons">
        <button id="uber">Request Now </button>
        <button id="amazon">Add to cart </button>
        <button id="github">Signup</button>
        <div id="bootsrapbuttons">
            <button id="bootstrap">Get Started </button>
            <button id="download">Download</button>
        </div>
        <div id="linkedinbuttons">
            <button id="linkedin">Apply to company Website</button>
            <button id="save">Save</button>
        </div>
        
        
    </div>
    
</body>
</html>
