<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <style>
        body{
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: aqua;
            background-color: blueviolet;

        }
        #container{
            background-color: brown;
        }
    </style>
</head>
<body>
    <div id="container">
        <button id="execute">Execute</button>
        <p id="passwordDisplay"></p>
    </div>

    <script>
        document.getElementById('execute').onclick = () => {
            function generatePassword(length, includeLowerCase, includeUpperCase, includeNumbers, includeSymbols){

                const lowerCaseChar = 'abcdefghijklmnopqrstuvwxyz';
                const upperCaseChar = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const numberChar = '1234567890';
                const symbolsChar = 'Â¬!"ÂŁ$%^&*()_+~}{:@?><}"';

                let allowedChars = '';
                let password = '';

                allowedChars += includeLowerCase ? lowerCaseChar: '';
                allowedChars += includeUpperCase ? upperCaseChar : '';
                allowedChars += includeNumbers ? numberChar : '';
                allowedChars += includeSymbols ? symbolsChar: '';

                if(length <= 0){
                    return` (password length must be at least 1)`
                }
                if (allowedChars.length === 0){
                    return` (Atleast 1 set of characters needs to be selected)`
                }
                for(let i = 0; i<length; i++){
                    const randomIndex = Math.floor(Math.random()*allowedChars.length);
                    password += allowedChars[randomIndex];


                }
                
                console.log(password);
                document.getElementById('passwordDisplay').textContent = password;

                return  password;
            }
            const passwordLength = 16;
            const includeLowerCase = true;
            const includeUpperCase = true;
            const includeNumbers = true;
            const includeSymbols = true;

            const password = generatePassword(passwordLength,
                            includeLowerCase,
                            includeUpperCase,
                            includeNumbers,
                            includeSymbols);
            console.log(`Generated Password: ${password}`);
            
    }
    </script>
</body>
</html>
