    <script>

        sum(displayPage, 2,7)
        function sum(callback, x,y){
            let result = x+y;
            callback(result);
        }
        function displayConsole(result){

        }
        function displayPage(result){
            document.getElementById("result").textContent = result;
        }
    </script>
