<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number guessing game</title>
</head>
<style>
    body{
        margin: 0;
        height: 100vh;
        background-color: indigo;
        color: yellowgreen;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;

    }
</style>
<body>
    <div id="container" class="container">
        <label id="min">Minimum Number</label><br><br>
        <input id="mininput" for="min" placeholder="Input Mininum Number"><br><br>

        <label id="max">Maximum Number</label><br><br>
        <input id="maxinput" for="min" placeholder="Input Maxinum Number"><br><br>

        <button id="generate">Generate</button>
        <p id="display"></p>

        <label id="guesslabel">Lets Guess the Number generated by the Computer</label><br><br>
        <input id="guessinput" for="guesslabel" placeholder="Can you Guess"><br><br>
        <button id="guessgenerate">Guess</button>
        <p id="guessdisplay"></p>



        <script>
            let min;
            let max;
            let answer;
            document.getElementById("generate").onclick = function () {
                min = document.getElementById("mininput").value;
                min = Number(min);

                max = document.getElementById("maxinput").value;
                max=Number(max);

                answer = Math.floor(Math.random() * (max-min + 1)) + min;

                document.getElementById("display").textContent = answer;
            }

            let guess;
            
            document.getElementById("guessgenerate").onclick  = () => {
                guess = document.getElementById("guessinput").value;
                guess=Number(guess)
                if (guess > answer) {
                    document.getElementById("guessdisplay").textContent = `YOU ARE TOO HIGH`
                }else if(guess < answer){
                    document.getElementById("guessdisplay").textContent = `YOU ARE LOW`
                } else{
                    document.getElementById("guessdisplay").textContent = `YOU ARE CORRECT`
                }
                
            }
        </script>

        
    </div>

</body>
</html>
