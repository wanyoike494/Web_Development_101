<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="myh1">Enter The Radius of Circle</h1>
    <label>Radius</label><br>
    <input type="text" id="radius1" placeholder="Enter Radius"><br><br>
    <button id="mysubmit">Submit</button>
    <p id="Circumference">Circumference</p>

    <script>
        
        const PI = Math.PI;
        let radius;
        let circumference;

        document.getElementById("mysubmit").onclick = () => {
            radius = document.getElementById("radius1").value;
            radius = Number(radius);
            circumference = 2*PI*radius;
            document.getElementById("Circumference").textContent = circumference;


        }

    </script>

    
</body>
</html>
