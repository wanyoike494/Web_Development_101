    <script>

        function openFridge (...foods){
            console.log(foods)
        }
        const food1 = 'pizza';
        const food2 = 'humburgr';
        const food3 = 'rice';

        function sum(...numbers){
            let result = 0;
            for(let number of numbers){
                result +=number;
            }
            return result;
        }
        const total = sum(1, 2, 3, 4, 5);
        console.log(`your total is ${total}`)
    </script>
