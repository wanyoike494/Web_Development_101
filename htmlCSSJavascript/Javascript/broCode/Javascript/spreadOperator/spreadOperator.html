<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread Operator</title>
</head>
<body>
    <script>
        //spread => expands an array into separate elements

        let numbers = [1,2,3,4,5];
        let maximum = Math.max(...numbers)
        console.log(maximum)

        let name = 'Joseph Wanyoike Njoroge';
        let letters = [...name].join('-');
        console.log(letters);

        let fruits = ['apples', 'banana', 'avocado'];
        let vegetables = ['carrots', 'potatoes', 'tomatoes'];

        let foods = [...fruits, ...vegetables, 'eggs', 'milk'];
        console.log(foods)
    </script>
</body>
</html>
