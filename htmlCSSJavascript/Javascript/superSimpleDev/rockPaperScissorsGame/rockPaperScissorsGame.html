<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            background-color: aliceblue;
            justify-content: center;
            align-items: center;
            color: brown;
            border-radius: 10px;
        }
        .container{
            background-color: aqua;
            height: 240px;
            width: 360px;
            border-radius: 10px;
            text-align: center;
            align-items: center;
            justify-content: center;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Rock Paper Scissors</p>
            <button onclick = "
            let randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 /3){
                computerMove = 'rock';
            }else if(randomNumber >= 1/3 && randomNumber < 2 /3){
                computerMove = 'paper';
            }else if(randomNumber >= 2/3 && randomNumber < 1 ){
                computerMove = 'scissors';
            }
            console.log(computerMove);
        ">Rock</button>

        <button onclick = "
            let randomNumber = Math.random();
            

            if (randomNumber >= 0 && randomNumber < 1 /3){
                computerMove = 'rock';
            }else if(randomNumber >= 1/3 && randomNumber < 2 /3){
                computerMove = 'paper';
            }else if(randomNumber >= 2/3 && randomNumber < 1 ){
                computerMove = 'scissors';
            }
            console.log(computerMove);
        ">Paper</button>

        <button onclick = "
            let randomNumber = Math.random();
            if (randomNumber >= 0 && randomNumber < 1 /3){
                computerMove = 'rock';
            }else if(randomNumber >= 1/3 && randomNumber < 2 /3){
                computerMove = 'paper';
            }else if(randomNumber >= 2/3 && randomNumber < 1 ){
                computerMove = 'scissors';
            }
            console.log(computerMove);
        ">Scissors</button>


        
    </div>
    
</body>
</html>
