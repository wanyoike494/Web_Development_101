<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="name"></p>
    <button id="display">Display</button>
</body>
<script>
    const names = ['Joseph', 'Mary', 'Tasha', 'sasha'];
    document.getElementById('display').addEventListener('click', (e) => {
        setTimeout(() => {
            names.forEach((name) => document.getElementById('name').textContent = names)
        }, 3000);
    })
</script>
</html>
