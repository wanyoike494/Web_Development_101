<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="name">My name is Joseph Wanyoike</p>
    <button id="execute">Print</button>
    <script>
        document.getElementById("execute").addEventListener('click', (e) => {
            setTimeout(() => {
                document.getElementById('name').textContent = `I am a Web Engineer`
            }, 5000);
        });
    </script>
</body>
</html>
